<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Friend Calendar</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Friend Schedule</p>
          <h1>Calendar</h1>
        </div>
      </header>

      <main class="layout">
        <div class="calendar-column">
          <section class="calendar-section">
            <div class="toolbar">
              <div class="toolbar-spacer"></div>
              <div class="period-nav">
                <button id="prevBtn" class="icon-button" aria-label="前へ">‹</button>
                <h2 id="periodTitle">-</h2>
                <button id="nextBtn" class="icon-button" aria-label="次へ">›</button>
              </div>
              <div class="view-switch" aria-label="表示切替">
                <button id="monthViewBtn" class="segmented active">月</button>
                <button id="weekViewBtn" class="segmented">週</button>
              </div>
            </div>

            <div id="calendarRoot" class="calendar-root" aria-live="polite"></div>
          </section>
          <p class="calendar-note">※Cookieやサイトデータを削除すると予定が消える場合があります。</p>
        </div>

        <aside class="side-panel">
          <section class="panel auth-panel">
            <h2>同期</h2>
            <p id="authStatus" class="muted">Firebase未設定のため、現在はローカル保存のみです。</p>
            <p id="syncStatus" class="mode-message">この端末の予定は localStorage に保存されます。</p>
            <div class="auth-actions">
              <button id="googleLoginBtn" class="button primary">Googleでログイン</button>
              <button id="logoutBtn" class="button subtle hidden">ログアウト</button>
              <button id="migrateBtn" class="button subtle hidden">ローカル予定をFirebaseに移行</button>
            </div>
          </section>

          <section class="panel today-panel">
            <div class="panel-heading">
              <h2>今日の予定</h2>
              <button id="newEventBtn" class="button primary">予定を追加</button>
            </div>
            <p id="modeMessage" class="mode-message">この端末の予定は localStorage に保存されます。</p>
            <div id="todayList" class="event-list empty">予定はありません</div>
          </section>

          <section class="panel search-panel">
            <h2>日付検索</h2>
            <div class="search-row">
              <input id="searchDate" type="date" />
              <button id="searchBtn" class="button subtle">検索</button>
            </div>
            <div id="searchResult" class="event-list empty">日付を選んでください</div>
          </section>

          <section class="panel notification-panel">
            <h2>通知</h2>
            <div class="search-row">
              <select id="reminderMinutes">
                <option value="0">予定時刻</option>
                <option value="5" selected>5分前</option>
                <option value="10">10分前</option>
                <option value="30">30分前</option>
                <option value="60">1時間前</option>
              </select>
              <button id="notificationBtn" class="button subtle">通知を許可</button>
            </div>
            <p class="muted">アプリを開いている間だけ、予定時刻の少し前にブラウザ通知します。</p>
          </section>
        </aside>
      </main>
    </div>

    <dialog id="eventDialog" class="dialog">
      <form id="eventForm" method="dialog">
        <div class="dialog-header">
          <h2 id="dialogTitle">予定を追加</h2>
          <button type="button" id="closeDialogBtn" class="icon-button" aria-label="閉じる">×</button>
        </div>
        <input id="eventId" type="hidden" />
        <label>
          日付
          <input id="eventDate" type="date" required />
        </label>
        <div class="two-cols">
          <label>
            開始時刻
            <input id="startTime" type="time" required />
          </label>
          <label>
            終了時刻
            <input id="endTime" type="time" />
          </label>
        </div>
        <label>
          誰とやるか
          <input id="friendName" type="text" maxlength="80" placeholder="例: Taro, guild members" required />
        </label>
        <label>
          メモ
          <textarea id="memo" rows="4" maxlength="500" placeholder="ゲーム名、集合場所、VCなど"></textarea>
        </label>
        <div class="dialog-actions">
          <button type="button" id="deleteEventBtn" class="button danger hidden">削除</button>
          <button type="submit" class="button primary">保存</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
